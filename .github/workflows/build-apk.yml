name: Build Android APK

on:
  push:
    paths:
      - 'android_app/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Make Gradle Wrapper Executable
        run: |
          cd android_app
          # Generate a gradle wrapper since we didn't commit one
          gradle wrapper
          chmod +x gradlew
          
      - name: Build Debug APK
        run: |
          cd android_app
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lost-found-app-debug.apk
          path: android_app/app/build/outputs/apk/debug/app-debug.apk

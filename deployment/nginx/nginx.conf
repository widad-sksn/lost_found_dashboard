events {
    worker_connections 1024;
}

http {
    # WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream odoo {
        server web:8069;
    }
    
    upstream grafana {
        server grafana:3000;
    }

    # Main Odoo Server Block
    server {
        listen 80 default_server;
        server_name lostn-found.web.id www.lostn-found.web.id _;

        if ($http_x_forwarded_proto = "http") {
            return 301 https://$host$request_uri;
        }

        # Add Headers for Cloudflare Proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase max body size for image uploads in Odoo
        client_max_body_size 100M;

        # Timeouts
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;

        location / {
            proxy_pass http://odoo;
            proxy_redirect off;
        }

        # WebSocket support for Odoo live chat / bus
        location /websocket {
            proxy_pass http://odoo;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Cache static files
        location ~* /web/static/ {
            proxy_pass http://odoo;
            proxy_cache_valid 200 60m;
            proxy_buffering on;
            expires 864000;
        }
    }

    # Grafana Server Block
    server {
        listen 80;
        server_name monitor.lostn-found.web.id;

        if ($http_x_forwarded_proto = "http") {
            return 301 https://$host$request_uri;
        }

        location / {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

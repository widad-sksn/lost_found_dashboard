events {
    worker_connections 1024;
}

http {
    upstream odoo {
        server web:8069;
    }
    
    upstream grafana {
        server grafana:3000;
    }

    # Main Odoo Server Block
    server {
        listen 80;
        server_name lostn-found.web.id www.lostn-found.web.id;

        # Add Headers for Cloudflare Proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase max body size for image uploads in Odoo
        client_max_body_size 100M;

        location / {
            proxy_pass http://odoo;
            proxy_redirect off;
        }

        # Cache static files
        location ~* /web/static/ {
            proxy_pass http://odoo;
            proxy_cache_valid 200 60m;
            proxy_buffering on;
            expires 864000;
        }
    }

    # Grafana Server Block (Access via subdomain or specific port)
    # E.g., monitor.lostn-found.web.id
    server {
        listen 80;
        server_name monitor.lostn-found.web.id;

        location / {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  # If you add an Odoo Prometheus Exporter later, you can uncomment this
  # - job_name: 'odoo'
  #   static_configs:
  #     - targets: ['web:8069']
